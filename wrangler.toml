name = "hrsc"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding      = "TAXONOMY_DB"
database_name = "taxonomy-db"
database_id  = "6e27c8cd-3b59-4e5a-9f14-35b5ad38b45e"

# ── R2 Buckets (optional — for export file storage) ──────────────────────────
# Uncomment after creating: wrangler r2 bucket create taxonomy-exports
# [[r2_buckets]]
# binding     = "TAXONOMY_EXPORTS"
# bucket_name = "taxonomy-exports"

[[d1_databases]]
binding       = "FOCUSFLOW_DB"
database_name = "focusflow-db"
database_id   = "aa0f9130-84c5-4405-9b7a-7f3ae165962f"

# ── Environment variables ─────────────────────────────────────────────────────
[vars]
TAXONOMY_APP_VERSION = "1.0.0"
# Session token secret — set a strong random value in Pages dashboard for production
FOCUSFLOW_SESSION_SECRET = "dev-secret-change-in-production"
# ANTHROPIC_API_KEY is set in Cloudflare Pages dashboard environment variables (not here)
