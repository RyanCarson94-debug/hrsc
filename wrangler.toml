name = "hrsc"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# ── D1 binding ────────────────────────────────────────────────────────────────
# Configure in Cloudflare Pages Dashboard (not here — placeholder UUIDs fail):
#   Settings → Functions → D1 database bindings
#   Variable name : TAXONOMY_DB
#   Database      : taxonomy-db  (create it first, see below)
#
# One-time setup:
#   wrangler d1 create taxonomy-db
#   wrangler d1 execute taxonomy-db --file migrations/0001_taxonomy.sql
#
# Local dev:
#   wrangler pages dev dist --d1 TAXONOMY_DB=<your-database-id>

# ── R2 Buckets (optional — for export file storage) ──────────────────────────
# Uncomment after creating: wrangler r2 bucket create taxonomy-exports
# [[r2_buckets]]
# binding     = "TAXONOMY_EXPORTS"
# bucket_name = "taxonomy-exports"

# ── Environment variables ─────────────────────────────────────────────────────
[vars]
TAXONOMY_APP_VERSION = "1.0.0"
